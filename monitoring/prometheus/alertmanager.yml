route:
  group_by: ['alertname','cluster','service']
  group_wait: 1m
  group_interval: 1m
  repeat_interval: 2m
  receiver: 'telegram'
receivers:
  - name: 'telegram'
    telegram_configs:
    - bot_token: '8515931439:AAEAHxm4GRl60GrQqDwit0SBf*BXVnpkTd0'
      api_url: 'https://api.telegram.org'
      chat_id: -5143149561
      message:  "Alertname: {{ .GroupLabels.alertname }}\nSeverity: {{ .CommonLabels.severity }}\n{{ range .Alerts }}Description: {{ .Annotations.description }}\n{{ end }}"
      parse_mode: ''
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'dev', 'instance']
~
