# my global config
global:
  scrape_interval: 15s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
  evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.
  # scrape_timeout is set to the global default (10s).

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
           - localhost:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  - "/etc/prometheus/rules/node_exporter.yml"
  - "/etc/prometheus/rules/blackbox.yml"
  # - "first_rules.yml"
  # - "second_rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node"
    scrape_interval: 30s
    file_sd_configs:
    - files:
      - "/etc/prometheus/files_sd/node_exporter.yml"

  - job_name: "blackbox"
    metrics_path: /probe
    params:
      module: [http_2xx] # look for a http 200 response
    static_configs:
      - targets:
        - http://registrator.example.com:5000/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: app-vb-1.example.com:9115

  - job_name: "bind_exporter"
    static_configs:
      - targets:
        - dns-vb-1.example.com:9119
        
